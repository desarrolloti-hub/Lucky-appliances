    <style>
        .maintenance-container {
            background-color: var(--white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--gray);
            transition: var(--transition);
        }

        .maintenance-icon {
            font-size: 3.5rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            text-shadow: var(--shadow);
            transition: var(--transition);
        }

        .maintenance-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
            transition: var(--transition);
        }

        .maintenance-message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: var(--text-light);
            transition: var(--transition);
        }

        .maintenance-message p {
            margin: 0.8rem 0;
        }

        .maintenance-team {
            font-style: italic;
            margin-top: 2rem;
            color: var(--text-light);
            transition: var(--transition);
        }

        .maintenance-team a {
            color: var(--accent);
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        .maintenance-team a:hover {
            color: var(--accent-dark);
            background-color: rgba(245, 215, 66, 0.1);
            text-decoration: underline;
        }

        /* Fondo degradado con colores del tema */
        .wave-decoration {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(
                90deg, 
                var(--primary) 0%, 
                var(--primary-dark) 100%
            );
            transition: var(--transition);
        }

        /* Ajustes específicos para modo claro */
        .maintenance-container:not(.dark-mode *) {
            background-color: #ffffff;
        }

        /* Ajustes específicos para modo oscuro */
        .dark-mode .maintenance-team a:hover {
            background-color: rgba(245, 215, 66, 0.15);
        }

        @media (max-width: 600px) {
            .maintenance-container {
                padding: 1.8rem;
            }
            
            .maintenance-title {
                font-size: 1.5rem;
            }
            
            .maintenance-message {
                font-size: 1rem;
            }
            
            .maintenance-icon {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>

    <center>
    <div class="maintenance-container">

        </div>
        <h1 class="maintenance-title">Application Maintenance</h1>
        <div class="maintenance-message">
            <p>This application module is currently undergoing maintenance.</p>
            <p>We're working to improve your experience.</p>
            <p>We apologize for any inconvenience.</p>
        </div>
        <div class="maintenance-team">
            <p><a href="https://rsienterprise.com" target="_blank">RSI Enterprise Mexico Team</a></p>
            <br>
            <p><a href="https://lucky-appliances.com/" target="_blank">Continue Browsing at Lucky Appliances</a></p>
        </div>
        <div class="wave-decoration"></div>
    </div>
    </center>
