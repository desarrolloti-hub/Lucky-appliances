<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Lucky Appliances</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/icons/Logo Lucky Apliances.png" type="image/png">
    <meta name="description" content="Lucky Appliances Admin Dashboard - Manage products, categories, brands and more">
    <meta name="author" content="Lucky Appliances">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lucky-appliances.com/admin">
    <meta property="og:title" content="Admin Dashboard | Lucky Appliances">
    <meta property="og:description" content="Manage your appliance store inventory and content">
    <meta property="og:image" content="https://lucky-appliances.com/img/Logo-Lucky-Apliances.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Admin Dashboard | Lucky Appliances">
    <meta name="twitter:description" content="Manage your appliance store inventory and content">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashAdmin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
</head>
<body>
    <!-- Navbar flotante se cargará aquí -->
    <script src="/components/navbar-admin-component.js"></script>
    <script src="/components/theme-manager.js"></script>

    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <h1>
                    <i class="fas fa-crown"></i>
                    Admin Dashboard
                </h1>
                <p>Welcome to Lucky Appliances Administration Panel. As an administrator, you have full access to all system modules.</p>
            </div>
            <div class="welcome-badge" id="welcomeUser">Welcome, Administrator</div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <h2 class="stats-title">
                <i class="fas fa-chart-line"></i>
                Store Overview
            </h2>
            <div class="stats-grid" id="statsGrid">
                <!-- Stats will be loaded dynamically -->
            </div>
        </section>

        <!-- All Modules Section -->
        <section class="quick-actions-section">
            <h2 class="stats-title">
                <i class="fas fa-cubes"></i>
                All System Modules
            </h2>
            <div id="modulesContainer" class="modules-container">
                <!-- Modules will be loaded dynamically -->
                <div class="loading-modules" style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--accent);"></i>
                    <p style="margin-top: 20px; color: var(--text-light);">Loading all modules...</p>
                </div>
            </div>
        </section>
        <!-- Recent Activity Section -->
        <section class="recent-activity-section">
            <h2 class="stats-title">
                <i class="fas fa-history"></i>
                Recent Activity
            </h2>
            <div class="activity-list" id="recentActivity">
                <!-- Activity will be loaded dynamically -->
            </div>
        </section>

        <!-- Dashboard Footer -->
        <footer class="dashboard-footer">    
            <span id="currentDate"></span>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="dashAdmin.js"></script>
    <script src="/components/footer-admin-component.js"></script>
</body>
</html>
