<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clients | Lucky Appliances</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/icons/Logo Lucky Apliances.png" type="image/png">
    <meta name="description" content="Manage your clients">
    <meta name="author" content="Lucky Appliances">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lucky-appliances.com/clients">
    <meta property="og:title" content="Clients | Lucky Appliances">
    <meta property="og:description" content="Manage your clients">

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="../dashAdmin/dashAdmin.css">
    <link rel="stylesheet" href="clientsAdmin.css">
</head>
<body>
    <!-- Navbar -->
    <script src="/components/navbar-admin-component.js"></script>
    <script src="/components/theme-manager.js"></script>

    <div class="clients-container">
        <!-- Header -->
        <header class="clients-header">
            <h1>
                <i class="fas fa-users"></i>
                Clients
            </h1>
            <p class="clients-subtitle">Manage your customer database</p>
        </header>

        <!-- Actions Bar -->
        <div class="actions-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name, email or phone...">
            </div>
            <button id="addClientBtn" class="btn-add">
                <i class="fas fa-plus"></i>
                Add Client
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="stat-info">
                    <span class="stat-label">Total Clients</span>
                    <span class="stat-value" id="totalClients">0</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-shopping-cart"></i>
                <div class="stat-info">
                    <span class="stat-label">Total Purchases</span>
                    <span class="stat-value" id="totalPurchases">0</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-envelope"></i>
                <div class="stat-info">
                    <span class="stat-label">With Email</span>
                    <span class="stat-value" id="withEmail">0</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-phone"></i>
                <div class="stat-info">
                    <span class="stat-label">With Phone</span>
                    <span class="stat-value" id="withPhone">0</span>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading clients...</p>
        </div>

        <!-- Clients Grid -->
        <div id="clientsGrid" class="clients-grid" style="display: none;">
            <!-- Clients will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-user-plus"></i>
            <h3>No clients yet</h3>
            <p>Click the "Add Client" button to create your first client</p>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination" style="display: none;">
            <button id="prevPageBtn" class="btn-pagination" disabled>
                <i class="fas fa-chevron-left"></i> Previous
            </button>
            <span id="pageInfo" class="page-info">Page 1 of 1</span>
            <button id="nextPageBtn" class="btn-pagination" disabled>
                Next <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Modal for Add/Edit Client -->
    <div id="clientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">
                    <i class="fas fa-user-plus"></i>
                    Add Client
                </h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="clientForm">
                    <input type="hidden" id="clientId">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Customer Name *</label>
                        <input type="text" id="customerName" required placeholder="Full name">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Address</label>
                        <textarea id="address" rows="2" placeholder="Street, city, state, zip code"></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone</label>
                        <input type="tel" id="phone" placeholder="Contact number">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="Email address">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancel">Cancel</button>
                        <button type="submit" class="btn-save">Save Client</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="clientsAdmin.js"></script>
    <script src="/components/footer-admin-component.js"></script>
</body>
</html>
