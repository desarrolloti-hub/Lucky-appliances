<!DOCTYPE html>
<html lang="en">
<head>
    <title>Manage Comments | Lucky Appliances</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/icons/Logo Lucky Apliances.png" type="image/png">
    <meta name="description" content="Lucky Appliances Admin Dashboard - Manage customer comments">
    <meta name="author" content="Lucky Appliances">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lucky-appliances.com/admin/comments">
    <meta property="og:title" content="Comment Management | Lucky Appliances">
    <meta property="og:description" content="Manage customer comments and feedback">
    <meta property="og:image" content="https://lucky-appliances.com/img/Logo-Lucky-Apliances.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Comment Management | Lucky Appliances">
    <meta name="twitter:description" content="Manage customer comments and feedback">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../dashAdmin/dashAdmin.css">
    <link rel="stylesheet" href="commentAdmin.css">
</head>
<body>
    <!-- Navbar -->
    <script src="/components/navbar-admin-component.js"></script>
    <script src="/components/theme-manager.js"></script>

    <div class="dashboard-container comment-admin-container">
        <!-- Header -->
        <header class="comment-header">
            <div>
                <h1>
                    <i class="fas fa-comments"></i>
                    Customer Comments
                </h1>
                <p class="header-description">Manage customer feedback and comments</p>
            </div>
        </header>

        <!-- Stats Cards -->
        <div id="statsContainer" class="comment-stats">
            <!-- Stats will be loaded dynamically -->
        </div>

        <!-- Filter Controls -->
        <div class="filter-controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" 
                       id="searchInput" 
                       placeholder="Search comments..."
                       class="search-input">
            </div>
            
            <div class="filter-buttons">
                <button id="filterAll" class="filter-btn active">
                    <i class="fas fa-layer-group"></i>
                    All
                </button>
                <button id="filterUnread" class="filter-btn">
                    <i class="fas fa-envelope"></i>
                    Unread
                </button>
                <button id="filterRead" class="filter-btn">
                    <i class="fas fa-envelope-open"></i>
                    Read
                </button>
                <button id="filterPublished" class="filter-btn">
                    <i class="fas fa-eye"></i>
                    Published
                </button>
                <button id="filterArchived" class="filter-btn">
                    <i class="fas fa-archive"></i>
                    Archived
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading">
            <i class="fas fa-spinner"></i>
            <p>Loading comments...</p>
        </div>

        <!-- Comments Grid -->
        <div id="commentsContainer" class="comments-grid">
            <!-- Comments will be loaded here dynamically -->
        </div>

        <!-- Empty State (hidden by default) -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-comments"></i>
            <h3>No comments found</h3>
            <p>Try changing your filters or search terms</p>
        </div>
    </div>

    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Main Script -->
    <script type="module" src="./commentAdmin.js"></script>
    <script src="/components/footer-admin-component.js"></script>
</body>
</html>
