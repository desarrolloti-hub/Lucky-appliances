<!DOCTYPE html>
<html lang="en">
<head>
    <title>Manage Users | Lucky Appliances</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/icons/Logo Lucky Apliances.png" type="image/png">
    <meta name="description" content="Lucky Appliances Admin Dashboard - Manage users">
    <meta name="author" content="Lucky Appliances">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lucky-appliances.com/admin/users">
    <meta property="og:title" content="User Management | Lucky Appliances">
    <meta property="og:description" content="Manage users for your appliance store">
    <meta property="og:image" content="https://lucky-appliances.com/img/Logo-Lucky-Apliances.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="User Management | Lucky Appliances">
    <meta name="twitter:description" content="Manage users for your appliance store">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/users/administrator/newUserAdmin/newUserAdmin.css">
</head>
<body>
    <!-- Navbar -->
    <script src="/components/navbar-collaborator-component.js"></script>
    <script src="/components/theme-manager.js"></script>

    <div class="dashboard-container user-admin-container">
        <!-- Header -->
        <header class="user-header">
            <div>
                <h1>
                    <i class="fas fa-users-cog"></i>
                    Manage Users
                </h1>
                <p class="header-description">Manage user accounts, roles, and permissions</p>
            </div>
            
            <div class="header-info">
                <div class="header-stats">
                    <div class="stat-item total-users">
                        <i class="fas fa-users"></i>
                        Total Users: <span id="itemCount">0</span>
                    </div>
                    <div class="stat-item active-users">
                        <i class="fas fa-user-check"></i>
                        Active Users: <span id="activeCount">0</span>
                    </div>
                    <div class="stat-item admins">
                        <i class="fas fa-crown"></i>
                        Admins: <span id="adminCount">0</span>
                    </div>
                </div>
                
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" 
                           id="searchInput" 
                           placeholder="Search users..."
                           class="search-input"
                           autocomplete="off"> <!-- Agregado autocomplete -->
                </div>
                
                <button id="addBtn" class="btn-primary">
                    <i class="fas fa-user-plus"></i>
                    New User
                </button>
            </div>
        </header>

        <!-- Loading -->
        <div id="loading" class="loading">
            <i class="fas fa-spinner"></i>
            <p>Loading users...</p>
        </div>

        <!-- User Grid -->
        <div id="userContainer" class="user-grid">
            <!-- Users will be loaded here dynamically -->
        </div>
    </div>

    <!-- Form Overlay -->
    <div id="formOverlay" class="form-overlay"></div>

    <!-- Form (initially hidden) -->
    <div id="formContainer" class="form-container">
        <div class="form-header">
            <h2 id="formTitle">
                <i class="fas fa-user-plus"></i>
                Add User
            </h2>
            <button id="cancelBtn" class="btn-close">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="form-content">
            <form id="userForm">
                <input type="hidden" id="userId">
                
                <div class="form-group">
                    <label for="photoUploadArea">
                        <i class="fas fa-camera"></i>
                        Profile Photo
                    </label>
                    <div class="photo-upload-area" id="photoUploadArea">
                        <div id="photoPreview" class="photo-preview">
                            <i class="fas fa-user"></i>
                        </div>
                        <p>Click to upload photo</p>
                        <p class="text-light">Maximum 2MB</p>
                        <input type="file" 
                               id="photoInput" 
                               accept="image/*"
                               style="display: none;">
                        <button type="button" id="removePhotoBtn" class="remove-photo" style="display: none;">
                            <i class="fas fa-trash"></i> Remove Photo
                        </button>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="FirstName">
                            <i class="fas fa-user"></i>
                            First Name *
                        </label>
                        <input type="text" 
                               id="FirstName" 
                               class="form-control" 
                               placeholder="First name"
                               required
                               maxlength="50"
                               autocomplete="given-name"> <!-- Agregado autocomplete -->
                    </div>
                    
                    <div class="form-group">
                        <label for="LastName">
                            <i class="fas fa-user"></i>
                            Last Name *
                        </label>
                        <input type="text" 
                               id="LastName" 
                               class="form-control" 
                               placeholder="Last name"
                               required
                               maxlength="50"
                               autocomplete="family-name"> <!-- Agregado autocomplete -->
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="Email">
                        <i class="fas fa-envelope"></i>
                        Email Addbtn-reset-passwords *
                    </label>
                    <input type="email" 
                           id="Email" 
                           class="form-control" 
                           placeholder="user@example.com"
                           required
                           maxlength="100"
                           autocomplete="email"> <!-- Agregado autocomplete -->
                </div>
                
                <div class="form-group" id="passwordField">
                    <label for="Password" id="passwordLabel">
                        <i class="fas fa-key"></i>
                        Password *
                    </label>
                    <div class="password-field">
                        <input type="password" 
                               id="Password" 
                               class="form-control" 
                               placeholder="Minimum 6 characters"
                               minlength="6"
                               autocomplete="new-password"> <!-- Agregado autocomplete -->
                        <button type="button" id="togglePassword" class="password-toggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="form-hint">Password must be at least 6 characters long</small>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="Position">
                            <i class="fas fa-briefcase"></i>
                            Position/Title
                        </label>
                        <input type="text" 
                               id="Position" 
                               class="form-control" 
                               placeholder="e.g., Sales Manager"
                               maxlength="100"
                               autocomplete="organization-title"> <!-- Agregado autocomplete -->
                    </div>
                    
                    <div class="form-group">
                        <label for="Role">
                            <i class="fas fa-user-tag"></i>
                            Role *
                        </label>
                        <select id="Role" class="form-control" required>
                            <option value="auditor">Auditor</option>
                            <option value="sales">Sales</option>
                            <option value="store">Store</option>
                            <option value="developer">Developer</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="Active" style="cursor: pointer;">
                        <input type="checkbox" 
                               id="Active" 
                               checked
                               style="margin-right: 8px;">
                        <i class="fas fa-check-circle"></i>
                        Active Account
                    </label>
                    <small class="form-hint">Inactive users cannot log in to the system</small>
                </div>
                
                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn-submit">
                        <i class="fas fa-save"></i>
                        Save User
                    </button>
                    <button type="button" id="cancelBtn2" class="btn-cancel">
                        <i class="fas fa-times"></i>
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/components/protect-page-component.js" data-module="users"></script>
    <!-- Main Script -->
    <script type="module" src="/users/administrator/newUserAdmin/newUserAdmin.js"></script>
    <script src="/components/footer-admin-component.js"></script>
</body>
</html>
