<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Lucky Appliances</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/icons/Logo Lucky Apliances.png" type="image/png">
    <meta name="description" content="Lucky Appliances Dashboard - Access your authorized modules">
    <meta name="author" content="Lucky Appliances">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lucky-appliances.com/dashboard">
    <meta property="og:title" content="Dashboard | Lucky Appliances">
    <meta property="og:description" content="Access your authorized modules and manage content">
    <meta property="og:image" content="https://lucky-appliances.com/img/Logo-Lucky-Apliances.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Dashboard | Lucky Appliances">
    <meta name="twitter:description" content="Access your authorized modules and manage content">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/users/administrator/dashAdmin/dashAdmin.css">
    <link rel="stylesheet" href="./dashboardGeneral.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body>
    <!-- Navbar flotante se cargará aquí -->
    <script src="/components/navbar-collaborator-component.js"></script>
    <script src="/components/theme-manager.js"></script>

    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <h1>
                    <i class="fas fa-tachometer-alt"></i>
                    Dashboard General
                </h1>
                <p>Welcome to your personalized dashboard. Access the modules you have permission to use.</p>
            </div>

        </header>

        <!-- Modules Grid Section -->
        <section class="quick-actions-section">
            <h2 class="stats-title">
                <i class="fas fa-cubes"></i>
                Available Modules
            </h2>
            <div id="modulesContainer" class="modules-grid">
                <!-- Modules will be loaded here based on permissions -->
                <div class="loading-modules">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading your modules...</p>
                </div>
            </div>
        </section>

        <!-- Access Summary Section -->
        <section class="stats-section" id="accessSummary" style="display: none;">
            <h2 class="stats-title">
                <i class="fas fa-chart-pie"></i>
                Access Summary
            </h2>
            <div class="stats-grid" id="accessStats">
                <!-- Stats will be loaded dynamically -->
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="dashboardGeneral.js"></script>
    <script src="/components/footer-admin-component.js"></script>
</body>
</html>
