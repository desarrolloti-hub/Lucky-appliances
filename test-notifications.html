<!DOCTYPE html>
<html>
<head>
    <title>Enviar Notificación</title>
</head>
<body>
    <input type="text" id="token" placeholder="Token FCM" style="width:100%; margin:10px 0; padding:10px;">
    <input type="text" id="title" placeholder="Título" value="🔔 Lucky Appliances" style="width:100%; margin:10px 0; padding:10px;">
    <textarea id="body" placeholder="Mensaje" style="width:100%; margin:10px 0; padding:10px; height:100px;"></textarea>
    <button onclick="enviar()" style="padding:10px 20px; background:#0a2540; color:white; border:none; border-radius:5px; cursor:pointer;">Enviar</button>
    <pre id="resultado" style="margin-top:20px; padding:10px; background:#f5f5f5;"></pre>

    <script>
    async function enviar() {
        const resultado = document.getElementById('resultado');
        resultado.textContent = 'Enviando...';
        
        try {
            const response = await fetch('https://us-central1-lucky-appliances.cloudfunctions.net/sendNotification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: document.getElementById('token').value,
                    title: document.getElementById('title').value,
                    body: document.getElementById('body').value
                })
            });
            
            const data = await response.json();
            resultado.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
            resultado.textContent = 'Error: ' + error.message;
        }
    }
    //comentario para el commit
    </script>
</body>
</html>
